<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPACE AI</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent 40%),
              radial-gradient(circle at 80% 70%, #7c3aed, transparent 40%),
              #0f172a;
  overflow: hidden;
}

/* Floating glow blobs */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(99,102,241,0.4), transparent 70%);
  border-radius: 50%;
  filter: blur(80px);
  animation: float 12s infinite alternate ease-in-out;
}

body::after {
  background: radial-gradient(circle, rgba(168,85,247,0.4), transparent 70%);
  top: 50%;
  left: 60%;
  animation-delay: 4s;
}

@keyframes float {
  from { transform: translateY(-20px); }
  to { transform: translateY(20px); }
}

.chat-container {
  width: 440px;
  height: 640px;
  backdrop-filter: blur(30px);
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 28px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow:
    0 25px 60px rgba(0,0,0,0.5),
    inset 0 0 40px rgba(255,255,255,0.05);
}

.chat-header {
  padding: 20px;
  text-align: center;
  font-size: 20px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 1px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
}

.chat-messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
}

.chat-messages::-webkit-scrollbar {
  width: 6px;
}

.chat-messages::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
}

.message {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.6;
  backdrop-filter: blur(15px);
  transition: all 0.2s ease;
  animation: fadeIn 0.25s ease-in;
}

.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  box-shadow: 0 8px 20px rgba(59,130,246,0.4);
}

.bot {
  align-self: flex-start;
  background: rgba(255,255,255,0.08);
  color: #f1f5f9;
  border: 1px solid rgba(255,255,255,0.1);
}

.chat-input {
  display: flex;
  padding: 16px;
  gap: 10px;
  border-top: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
}

.chat-input input {
  flex: 1;
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.07);
  color: white;
  outline: none;
  backdrop-filter: blur(10px);
  transition: 0.2s;
}

.chat-input input:focus {
  border: 1px solid #6366f1;
  box-shadow: 0 0 10px rgba(99,102,241,0.6);
}

.chat-input button {
  padding: 12px 18px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  font-weight: 500;
  cursor: pointer;
  transition: 0.25s;
  box-shadow: 0 8px 20px rgba(139,92,246,0.5);
}

.chat-input button:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 25px rgba(139,92,246,0.7);
}

.bot pre {
  background: rgba(0,0,0,0.4);
  padding: 10px;
  border-radius: 10px;
  overflow-x: auto;
  margin-top: 8px;
}

.bot code {
  color: #38bdf8;
}

.typing::after {
  content: "|";
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">⚡SPACE AI</div>
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
async function sendMessage() {
  const input = document.getElementById("userInput");
  const messages = document.getElementById("messages");

  const userText = input.value.trim();
  if (!userText) return;

  const userDiv = document.createElement("div");
  userDiv.className = "message user";
  userDiv.textContent = userText;
  messages.appendChild(userDiv);

  input.value = "";

  const botDiv = document.createElement("div");
  botDiv.className = "message bot typing";
  messages.appendChild(botDiv);

  messages.scrollTop = messages.scrollHeight;

  const response = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: userText })
  });

  const reader = response.body.getReader();
  const decoder = new TextDecoder("utf-8");

  let fullText = "";

  // Collect full streamed response
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    fullText += decoder.decode(value);
  }

  // 🧠 Slow typing effect
  let currentText = "";
  for (let i = 0; i < fullText.length; i++) {
    currentText += fullText[i];
    botDiv.innerHTML = marked.parse(currentText);
   if (shouldAutoScroll(messages)) {
  messages.scrollTo({
  top: messages.scrollHeight,
  behavior: "smooth"
});
}

    await new Promise(resolve => setTimeout(resolve, 2)); // typing speed
  }

  botDiv.classList.remove("typing");
}
function shouldAutoScroll(container) {
  const threshold = 100; // px from bottom
  return container.scrollHeight - container.scrollTop - container.clientHeight < threshold;
}
</script>

</body>
</html>
